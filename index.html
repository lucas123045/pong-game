<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pong</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="menu">
  <h1 class="title">SPACE PONG</h1>

  <div id="planets">
    <button onclick="startFase(1)">Mercúrio</button>
    <button onclick="startFase(2)">Urano</button>
    <button onclick="startFase(3)">Terra</button>
    <button onclick="startFase(4)">Marte</button>
    <button onclick="startFase(5)">Júpiter</button>
    <button onclick="startFase(6)">Saturno</button>
    <button onclick="startFase(7)">Netuno</button>
  </div>
  <div id="pauseMenu" style="display:none;">
  <h1>PAUSE</h1>
  <button onclick="continuarJogo()">Continuar</button>
  <button onclick="voltarMenu()">Menu Principal</button>
  <button id="pauseBtn">⏸</button>
</div>

</div>
  <canvas id="gameCanvas"></canvas>

  <script src="script.js"></script>
</body>
</html>
